server:
  port: 6699  #浏览器/微信小程序认为 6666 是"不安全端口"，阻止了请求。

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: aioveu-gateway
  cloud:
    nacos:
      # 配置中心  # 配置中心配置  先获取配置，后执行服务发现”
      config:
        enabled: true
        server-addr: ${NACOS_SERVER:nacos:8848} # 使用服务名而非localhost
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:80147849-cdb8-4b7d-befc-b5aefa0e9ab6} #aioveu-prod  # 生产环境命名空间
        group: ${NACOS_GROUP:AIOVEU_GROUP}
        username: ${NACOS_USER:aioveu}  # 从环境变量读取
        password: ${NACOS_PASSWORD:775825}   # 从环境变量读取
        #name: ${spring.application.name}  # 默认情况下，应用会使用spring.application.name作为数据ID的前缀，所以这里可以不用配置，但可以显式配置
        shared-configs:
          - data-id: aioveu-common.yaml  # 公共共享配置
            group: ${NACOS_GROUP:AIOVEU_GROUP} # 使用相同的分组
            refresh: true  # 启用动态刷新

      # 注册中心 # 服务发现配置

      discovery:
        enabled: true
        server-addr: ${spring.cloud.nacos.config.server-addr}
        namespace: ${spring.cloud.nacos.config.namespace}
        group: ${spring.cloud.nacos.config.group}
        username: ${spring.cloud.nacos.config.username}  # 复用config的认证
        password: ${spring.cloud.nacos.config.password}
        metadata:
          version: 1.0
          env: prod
          zone: zone1

#找了一晚上的bug，根本原因是 Spring Cloud Alibaba 2023.0.0.0-RC1 与 Nacos 2.x 的兼容性要求，
#  1.历史版本兼容：旧版本的 Spring Cloud Alibaba 支持命名空间名称
#  2.新版本要求ID：2023.0.0.0-RC1 版本要求必须使用命名空间ID
#  3.空值处理：如果使用名称，Nacos 客户端可能将其视为空字符串，连接到默认命名空间（public）