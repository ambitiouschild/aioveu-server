payment:
  mq:
    topics:
      success: payment_success_topic
      failed: payment_failed_topic
      refund: payment_refund_topic
    retry:
      max-attempts: 5
      initial-interval: 30s
      multiplier: 2
    monitor:
      enabled: true
      backlog-threshold: 1000
      alert-interval: 5m

      #//Prometheus监控配置

      # prometheus.yml
      scrape_configs:
        - job_name: 'rocketmq_exporter'
          static_configs:
            - targets: [ 'rocketmq-exporter:5557' ]
              labels:
                group: 'payment'

        - job_name: 'payment_service'
          metrics_path: '/actuator/prometheus'
          static_configs:
            - targets: [ 'payment-service:8080' ]
              labels:
                application: 'payment-service'
