server:
  port: 9696

# 数据库类型：用于 MyBatis-Plus 分页方言等（仅方言，不负责连接信息）
app:
  db-type: mysql # 可选：mysql | postgres

spring:
  main:
    allow-circular-references: true
  mvc:
    path-match:
      matching-strategy: ant_path_matcher  # 使用Ant路径匹配策略

  config:
    import: # ✅ 正确：config.import才是数组
      #spring.config.import中的变量引用要在变量被解析后才能使用，但导入过程太早，变量还没被解析，所以直接写死配置文件名是最可靠的解决方案。
      # 按顺序导入配置
      # 必须指定group参数
      - optional:nacos:aioveu-common.yaml?group=AIOVEU_GROUP&namespace=public
      - optional:nacos:aioveu-tenant.yaml?group=AIOVEU_GROUP&namespace=public # 使用固定名称
#      - optional:nacos:${spring.application.name}.yaml?group=AIOVEU_GROUP
  cloud:
    nacos:
      # 配置中心  # 配置中心配置  先获取配置，后执行服务发现”
      config:
        enabled: true
        server-addr: ${NACOS_SERVER:localhost:8848} # 使用服务名而非localhost
        file-extension: yaml
        namespace: ${NACOS_NAMESPACE:a0e9ab31-f2c7-4c10-94a4-9f2f53e5a5ef} #aioveu-prod  # 生产环境命名空间
        group: ${NACOS_GROUP:AIOVEU_GROUP}
        username: ${NACOS_USER:aioveu}  # 从环境变量读取
        password: ${NACOS_PASSWORD:775825}   # 从环境变量读取
        #name: ${spring.application.name}  # 默认情况下，应用会使用spring.application.name作为数据ID的前缀，所以这里可以不用配置，但可以显式配置
        shared-configs:
          - data-id: aioveu-common.yaml  # 公共共享配置
            group: ${NACOS_GROUP:AIOVEU_GROUP} # 使用相同的分组
            refresh: true  # 启用动态刷新

      # 注册中心 # 服务发现配置

      discovery:
        enabled: true
        server-addr: ${spring.cloud.nacos.config.server-addr}
        namespace: ${spring.cloud.nacos.config.namespace}
        group: ${spring.cloud.nacos.config.group}
        username: ${spring.cloud.nacos.config.username}  # 复用config的认证
        password: ${spring.cloud.nacos.config.password}
        metadata:
          version: 1.0
          env: prod
          zone: zone1

logging:
  level:
    com.aioveu.tenant.aioveu10Log.mapper: debug

# 多租户配置
tenant:
  # 租户字段名（默认：tenant_id）
  column: tenant_id
  # 忽略多租户过滤的表名列表（系统表、租户表等不需要租户隔离的表）
  ignore-tables:
    - sys_tenant # 租户表本身
    - sys_tenant_plan # 租户套餐表
    - sys_tenant_plan_menu # 租户套餐菜单关联表
    - sys_menu # 菜单表（功能入口定义，所有租户共享）
    - sys_dict # 字典表（通常共享）
    - sys_dict_item # 字典项表（通常共享）
    - sys_config # 系统配置表（通常共享）
    - gen_table # 代码生成表（平台共用）
    - gen_table_column # 代码生成字段表（平台共用）
# ============================================

#  🎉 恭喜！
