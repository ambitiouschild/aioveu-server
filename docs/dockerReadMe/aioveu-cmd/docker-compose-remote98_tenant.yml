  rabbitmq:
    image: rabbitmq:3.12-management-alpine #rabbitmq:management
    container_name: aioveu-tenant-rabbitmq
#    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - RABBITMQ_DEFAULT_USER=adminlss
      - RABBITMQ_DEFAULT_PASS=adminlss
    ports:
